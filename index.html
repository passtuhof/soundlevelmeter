<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Шумомер</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden}
  body{
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;
    background:
      radial-gradient(circle at 50% 12%, rgba(185,255,24,.24), transparent 28%),
      radial-gradient(circle at 18% 78%, rgba(0,255,90,.14), transparent 34%),
      linear-gradient(135deg,#020600 0%,#071600 48%,#010300 100%);
  }
  body:before{
    content:"";
    position:fixed;inset:0;
    background:
      repeating-linear-gradient(90deg, rgba(128,255,0,.055) 0 1px, transparent 1px 18px),
      repeating-linear-gradient(0deg, rgba(128,255,0,.035) 0 1px, transparent 1px 18px);
    mask-image:radial-gradient(circle at center, black, transparent 78%);
    pointer-events:none;
  }
  .app{
    position:relative;
    width:100%;
    height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:clamp(10px,2.6vh,28px) 16px 16px;
  }
  h1{
    margin:0 0 clamp(6px,1.2vh,14px);
    font-size:clamp(42px,8.5vw,88px);
    line-height:.9;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:#b7ff18;
    text-shadow:0 0 12px rgba(183,255,24,.75), 0 4px 0 #122000, 0 8px 18px #000;
  }
  .stage{
    width:min(92vw,62vh,620px);
    aspect-ratio:1/1;
    position:relative;
    filter:drop-shadow(0 0 24px rgba(130,255,0,.25));
  }
  canvas{width:100%;height:100%;display:block}
  .center{
    position:absolute;
    inset:28% 20% 35%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    pointer-events:none;
  }
  .maxValue{
    order:1;
    font-weight:900;
    font-size:clamp(62px,15vw,128px);
    line-height:.82;
    color:#fff;
    text-shadow:0 0 18px rgba(183,255,24,.85), 0 5px 0 #111;
  }
  .maxLabel{
    order:2;
    margin-top:8px;
    font-size:clamp(13px,2.6vw,22px);
    color:#d9ff9b;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.95;
  }
  .liveValue{
    order:3;
    margin-top:7px;
    font-weight:800;
    font-size:clamp(17px,3.6vw,30px);
    color:#b7ff18;
  }
  .controls{
    display:flex;
    gap:14px;
    margin-top:clamp(4px,1vh,12px);
  }
  button{
    border:2px solid #b7ff18;
    border-radius:18px;
    background:linear-gradient(180deg,#c8ff2b,#6bd400);
    color:#071000;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:clamp(18px,4vw,30px);
    min-width:clamp(130px,28vw,220px);
    padding:16px 26px;
    box-shadow:0 0 22px rgba(183,255,24,.38), inset 0 2px 0 rgba(255,255,255,.35);
  }
  button.stop{
    background:linear-gradient(180deg,#222,#050505);
    color:#fff;
  }
  button:active{transform:scale(.96)}
  .flash{
    position:fixed;inset:0;
    background:radial-gradient(circle, rgba(183,255,24,.34), transparent 62%);
    opacity:0;
    pointer-events:none;
  }
  .flash.on{animation:flash .22s ease-out}
  @keyframes flash{0%{opacity:1}100%{opacity:0}}

  @media (orientation:landscape){
    .app{
      padding:6px 18px 8px;
      display:grid;
      grid-template-columns:1fr min(58vh,45vw) 1fr;
      grid-template-rows:auto auto;
      align-content:start;
      justify-items:center;
      column-gap:10px;
    }
    h1{
      grid-column:1 / 4;
      font-size:clamp(34px,6.5vh,66px);
      margin-bottom:0;
    }
    .stage{
      grid-column:2;
      width:min(59vh,45vw,530px);
    }
    .controls{
      grid-column:2;
      margin-top:0;
    }
    button{
      min-width:clamp(118px,18vw,190px);
      padding:10px 22px;
      font-size:clamp(16px,3.5vh,26px);
      border-radius:14px;
    }
    .maxValue{font-size:clamp(52px,14vh,108px)}
    .maxLabel{font-size:clamp(12px,3vh,20px)}
    .liveValue{font-size:clamp(16px,4vh,28px)}
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Шумомер</h1>

    <div class="stage">
      <canvas id="gauge" width="900" height="900"></canvas>
      <div class="center">
        <div class="maxValue" id="maxValue">0</div>
        <div class="maxLabel">Максимум</div>
        <div class="liveValue" id="liveValue">0</div>
      </div>
    </div>

    <div class="controls">
      <button id="playBtn">Плэй</button>
      <button id="stopBtn" class="stop">Стоп</button>
    </div>
  </div>
  <div class="flash" id="flash"></div>

<script>
(() => {
  const canvas = document.getElementById('gauge');
  const ctx = canvas.getContext('2d');
  const maxEl = document.getElementById('maxValue');
  const liveEl = document.getElementById('liveValue');
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');
  const flash = document.getElementById('flash');

  let audioCtx, analyser, source, stream, data;
  let running = false;
  let startedAt = 0;
  let current = 0;
  let peak = 0;
  let smooth = 0;
  let raf = null;

  let baseline = 0;
  let baselineSamples = [];
  const CALIBRATION_MS = 1000;

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function draw(value){
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2, r = w*0.36;
    ctx.clearRect(0,0,w,h);

    const start = Math.PI*0.78;
    const end = Math.PI*2.22;
    const t = clamp(value / 1000, 0, 1);
    const ang = start + (end-start)*t;

    ctx.save();
    ctx.translate(cx,cy);

    ctx.lineCap = 'round';
    ctx.lineWidth = 48;

    ctx.beginPath();
    ctx.arc(0,0,r,start,end);
    ctx.strokeStyle = 'rgba(255,255,255,.11)';
    ctx.stroke();

    const grad = ctx.createLinearGradient(-r,0,r,0);
    grad.addColorStop(0,'#55ff00');
    grad.addColorStop(.45,'#d7ff00');
    grad.addColorStop(.72,'#ff8a00');
    grad.addColorStop(1,'#ff1f1f');

    ctx.beginPath();
    ctx.arc(0,0,r,start,ang);
    ctx.strokeStyle = grad;
    ctx.stroke();

    for(let i=0;i<=50;i++){
      const a = start + (end-start)*(i/50);
      const big = i%5===0;
      const inner = r + (big?34:44);
      const outer = r + 62;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*inner, Math.sin(a)*inner);
      ctx.lineTo(Math.cos(a)*outer, Math.sin(a)*outer);
      ctx.lineWidth = big ? 7 : 3;
      ctx.strokeStyle = big ? 'rgba(220,255,120,.95)' : 'rgba(220,255,120,.35)';
      ctx.stroke();
    }

    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(-22,0);
    ctx.lineTo(r+30,0);
    ctx.lineWidth = 18;
    ctx.strokeStyle = '#ffffff';
    ctx.shadowColor = '#b7ff18';
    ctx.shadowBlur = 22;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0,0,34,0,Math.PI*2);
    ctx.fillStyle = '#b7ff18';
    ctx.shadowBlur = 28;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0,0,17,0,Math.PI*2);
    ctx.fillStyle = '#071000';
    ctx.shadowBlur = 0;
    ctx.fill();

    ctx.restore();

    // Надписи специально ниже шкалы
    ctx.font = '900 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,.72)';
    ctx.fillText('ТИШЕ', w*.21, h*.86);
    ctx.fillText('ГРОМЧЕ', w*.79, h*.86);
  }

  function rawAudioPower(){
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    let maxAbs = 0;

    for(let i=0;i<data.length;i++){
      const x = (data[i]-128)/128;
      sum += x*x;
      const a = Math.abs(x);
      if(a > maxAbs) maxAbs = a;
    }

    const rms = Math.sqrt(sum/data.length);
    return rms * 0.82 + maxAbs * 0.18;
  }

  function scoreFromPower(power){
    const noiseGate = 0.006;
    const adjusted = Math.max(0, power - baseline - noiseGate);

    if(adjusted <= 0) return 0;

    // Игровая шкала:
    // тишина = 0
    // нормальный крик = 200–400
    // громкий крик = 600–800
    // рекорд = 900–999, но верхушка сжата, чтобы 999 не получали все подряд
    let score = Math.pow(adjusted / 0.145, 0.72) * 1000;

    if(score > 820){
      score = 820 + (1 - Math.exp(-(score - 820) / 260)) * 179;
    }

    return Math.round(clamp(score, 0, 999));
  }

  async function start(){
    stop(false);

    current = 0;
    peak = 0;
    smooth = 0;
    baseline = 0;
    baselineSamples = [];

    maxEl.textContent = '0';
    liveEl.textContent = '0';
    draw(0);

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation:false,
        noiseSuppression:false,
        autoGainControl:false
      }
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.1;
    data = new Uint8Array(analyser.fftSize);
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    running = true;
    startedAt = performance.now();
    loop();
  }

  function loop(){
    if(!running) return;

    const now = performance.now();
    const power = rawAudioPower();

    // Первая секунда: стрелка и максимум на нуле, идет калибровка тишины
    if(now - startedAt < CALIBRATION_MS){
      baselineSamples.push(power);
      current = 0;
      smooth = 0;
      peak = 0;
      liveEl.textContent = '0';
      maxEl.textContent = '0';
      draw(0);
      raf = requestAnimationFrame(loop);
      return;
    }

    if(baselineSamples.length){
      baselineSamples.sort((a,b) => a-b);
      baseline = baselineSamples[Math.floor(baselineSamples.length * 0.55)] || 0;
      baselineSamples = [];
    }

    const rawScore = scoreFromPower(power);
    smooth = smooth * 0.62 + rawScore * 0.38;
    current = Math.round(smooth);

    if(current < 8) current = 0;

    if(current > peak){
      peak = current;
      maxEl.textContent = peak;
      if(peak > 120){
        flash.classList.remove('on');
        void flash.offsetWidth;
        flash.classList.add('on');
      }
    }

    liveEl.textContent = current;
    draw(current);
    raf = requestAnimationFrame(loop);
  }

  function stop(keepPeak = true){
    running = false;
    if(raf) cancelAnimationFrame(raf);
    raf = null;
    if(source) { try { source.disconnect(); } catch(e){} }
    if(stream) stream.getTracks().forEach(t => t.stop());
    if(audioCtx) { try { audioCtx.close(); } catch(e){} }
    source = null; stream = null; audioCtx = null;
    if(!keepPeak){
      peak = 0;
      current = 0;
      smooth = 0;
    }
  }

  playBtn.addEventListener('click', () => {
    start().catch(() => {});
  });

  stopBtn.addEventListener('click', () => {
    stop(true);
  });

  draw(0);
})();
</script>
</body>
</html>
