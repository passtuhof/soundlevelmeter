<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Шушмомер</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden}
  body{
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;
    background:
      radial-gradient(circle at 50% 15%, rgba(170,255,0,.22), transparent 28%),
      radial-gradient(circle at 18% 75%, rgba(0,255,80,.16), transparent 32%),
      linear-gradient(135deg,#030801 0%,#071400 42%,#010401 100%);
  }
  body:before{
    content:"";
    position:fixed;inset:0;
    background:
      repeating-linear-gradient(90deg, rgba(128,255,0,.055) 0 1px, transparent 1px 18px),
      repeating-linear-gradient(0deg, rgba(128,255,0,.035) 0 1px, transparent 1px 18px);
    mask-image:radial-gradient(circle at center, black, transparent 78%);
    pointer-events:none;
  }
  .app{
    position:relative;
    width:100%;
    height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:clamp(12px,3vh,34px) 16px 16px;
  }
  h1{
    margin:0 0 clamp(8px,1.5vh,18px);
    font-size:clamp(38px,8vw,86px);
    line-height:.9;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:#b7ff18;
    text-shadow:0 0 12px rgba(183,255,24,.75), 0 4px 0 #122000, 0 8px 18px #000;
  }
  .stage{
    width:min(92vw,62vh,620px);
    aspect-ratio:1/1;
    position:relative;
    filter:drop-shadow(0 0 24px rgba(130,255,0,.25));
  }
  canvas{width:100%;height:100%;display:block}
  .center{
    position:absolute;
    inset:31% 24%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    pointer-events:none;
  }
  .maxLabel{
    font-size:clamp(12px,2.2vw,18px);
    color:#d9ff9b;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.92;
  }
  .maxValue{
    font-weight:900;
    font-size:clamp(54px,13vw,112px);
    line-height:.9;
    color:#fff;
    text-shadow:0 0 18px rgba(183,255,24,.85), 0 5px 0 #111;
  }
  .liveValue{
    margin-top:6px;
    font-weight:800;
    font-size:clamp(18px,4vw,34px);
    color:#b7ff18;
  }
  .controls{
    display:flex;
    gap:14px;
    margin-top:clamp(8px,1.5vh,18px);
  }
  button{
    border:2px solid #b7ff18;
    border-radius:18px;
    background:linear-gradient(180deg,#c8ff2b,#6bd400);
    color:#071000;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:clamp(18px,4vw,30px);
    min-width:clamp(130px,28vw,220px);
    padding:16px 26px;
    box-shadow:0 0 22px rgba(183,255,24,.38), inset 0 2px 0 rgba(255,255,255,.35);
  }
  button.stop{
    background:linear-gradient(180deg,#222,#050505);
    color:#fff;
  }
  button:active{transform:scale(.96)}
  .flash{
    position:fixed;inset:0;
    background:radial-gradient(circle, rgba(183,255,24,.34), transparent 62%);
    opacity:0;
    pointer-events:none;
  }
  .flash.on{animation:flash .22s ease-out}
  @keyframes flash{0%{opacity:1}100%{opacity:0}}

  @media (orientation:landscape){
    .app{
      padding:8px 18px 10px;
      display:grid;
      grid-template-columns:1fr min(54vh,44vw) 1fr;
      grid-template-rows:auto auto;
      align-content:start;
      justify-items:center;
      column-gap:10px;
    }
    h1{
      grid-column:1 / 4;
      font-size:clamp(32px,6vh,64px);
      margin-bottom:2px;
    }
    .stage{
      grid-column:2;
      width:min(58vh,44vw,520px);
    }
    .controls{
      grid-column:2;
      margin-top:2px;
    }
    button{
      min-width:clamp(118px,18vw,190px);
      padding:10px 22px;
      font-size:clamp(16px,3.5vh,26px);
      border-radius:14px;
    }
    .maxValue{font-size:clamp(44px,13vh,98px)}
    .liveValue{font-size:clamp(18px,4.5vh,32px)}
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Шушмомер</h1>

    <div class="stage">
      <canvas id="gauge" width="900" height="900"></canvas>
      <div class="center">
        <div class="maxLabel">Максимум</div>
        <div class="maxValue" id="maxValue">0</div>
        <div class="liveValue" id="liveValue">0</div>
      </div>
    </div>

    <div class="controls">
      <button id="playBtn">Плэй</button>
      <button id="stopBtn" class="stop">Стоп</button>
    </div>
  </div>
  <div class="flash" id="flash"></div>

<script>
(() => {
  const canvas = document.getElementById('gauge');
  const ctx = canvas.getContext('2d');
  const maxEl = document.getElementById('maxValue');
  const liveEl = document.getElementById('liveValue');
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');
  const flash = document.getElementById('flash');

  let audioCtx, analyser, source, stream, data;
  let running = false;
  let startedAt = 0;
  let current = 0;
  let peak = 0;
  let smooth = 0;
  let raf = null;

  const START_DELAY = 1000;

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function draw(value){
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2, r = w*0.37;
    ctx.clearRect(0,0,w,h);

    const start = Math.PI*0.78;
    const end = Math.PI*2.22;
    const t = clamp(value / 350, 0, 1);
    const ang = start + (end-start)*t;

    ctx.save();
    ctx.translate(cx,cy);

    ctx.lineCap = 'round';
    ctx.lineWidth = 48;

    ctx.beginPath();
    ctx.arc(0,0,r,start,end);
    ctx.strokeStyle = 'rgba(255,255,255,.11)';
    ctx.stroke();

    const grad = ctx.createLinearGradient(-r,0,r,0);
    grad.addColorStop(0,'#55ff00');
    grad.addColorStop(.55,'#d7ff00');
    grad.addColorStop(1,'#ff2b2b');
    ctx.beginPath();
    ctx.arc(0,0,r,start,ang);
    ctx.strokeStyle = grad;
    ctx.stroke();

    for(let i=0;i<=60;i++){
      const a = start + (end-start)*(i/60);
      const big = i%5===0;
      const inner = r + (big?34:44);
      const outer = r + 62;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*inner, Math.sin(a)*inner);
      ctx.lineTo(Math.cos(a)*outer, Math.sin(a)*outer);
      ctx.lineWidth = big ? 7 : 3;
      ctx.strokeStyle = big ? 'rgba(220,255,120,.95)' : 'rgba(220,255,120,.35)';
      ctx.stroke();
    }

    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(-22,0);
    ctx.lineTo(r+30,0);
    ctx.lineWidth = 18;
    ctx.strokeStyle = '#ffffff';
    ctx.shadowColor = '#b7ff18';
    ctx.shadowBlur = 22;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0,0,34,0,Math.PI*2);
    ctx.fillStyle = '#b7ff18';
    ctx.shadowBlur = 28;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0,0,17,0,Math.PI*2);
    ctx.fillStyle = '#071000';
    ctx.shadowBlur = 0;
    ctx.fill();

    ctx.restore();

    ctx.font = '900 42px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,.65)';
    ctx.fillText('ТИШЕ', w*.21, h*.76);
    ctx.fillText('ГРОМЧЕ', w*.79, h*.76);
  }

  function getLevel(){
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    let maxAbs = 0;
    for(let i=0;i<data.length;i++){
      const x = (data[i]-128)/128;
      sum += x*x;
      const a = Math.abs(x);
      if(a > maxAbs) maxAbs = a;
    }
    const rms = Math.sqrt(sum/data.length);

    // Нелинейная шкала: тихий шум не раздувается, громкий крик хорошо растет.
    const score = Math.pow(rms, 0.58) * 360 + maxAbs * 42;
    return Math.round(clamp(score, 0, 999));
  }

  async function start(){
    stop(false);
    current = 0;
    peak = 0;
    smooth = 0;
    maxEl.textContent = '0';
    liveEl.textContent = '0';
    draw(0);

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation:false,
        noiseSuppression:false,
        autoGainControl:false
      }
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.18;
    data = new Uint8Array(analyser.fftSize);
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    running = true;
    startedAt = performance.now();
    loop();
  }

  function loop(){
    if(!running) return;

    const now = performance.now();

    if(now - startedAt < START_DELAY){
      current = 0;
      smooth = 0;
      liveEl.textContent = '0';
      maxEl.textContent = '0';
      draw(0);
      raf = requestAnimationFrame(loop);
      return;
    }

    const raw = getLevel();
    smooth = smooth * 0.72 + raw * 0.28;
    current = Math.round(smooth);

    if(current > peak){
      peak = current;
      maxEl.textContent = peak;
      flash.classList.remove('on');
      void flash.offsetWidth;
      flash.classList.add('on');
    }

    liveEl.textContent = current;
    draw(current);
    raf = requestAnimationFrame(loop);
  }

  function stop(keepPeak = true){
    running = false;
    if(raf) cancelAnimationFrame(raf);
    raf = null;
    if(source) { try { source.disconnect(); } catch(e){} }
    if(stream) stream.getTracks().forEach(t => t.stop());
    if(audioCtx) { try { audioCtx.close(); } catch(e){} }
    source = null; stream = null; audioCtx = null;
    if(!keepPeak){
      peak = 0;
      current = 0;
      smooth = 0;
    }
  }

  playBtn.addEventListener('click', () => {
    start().catch(() => {});
  });
  stopBtn.addEventListener('click', () => {
    stop(true);
  });

  draw(0);
})();
</script>
</body>
</html>
