<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Лавровые — Шумомер</title>
<style>
  :root {
    --bg:#061006; --green:#8cff00; --green2:#34e600; --white:#f6f6f6; --muted:#a7b3a2; --red:#ff2e2e;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin:0; min-height:100vh; overflow:hidden; color:var(--white);
    font-family: Impact, 'Arial Black', system-ui, sans-serif;
    background:
      radial-gradient(circle at 50% 18%, rgba(140,255,0,.22), transparent 34%),
      radial-gradient(circle at 50% 100%, rgba(0,255,55,.18), transparent 35%),
      linear-gradient(160deg, #020402 0%, #061306 55%, #020402 100%);
  }
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.18;
    background-image: radial-gradient(rgba(140,255,0,.75) 1px, transparent 1px);
    background-size: 18px 18px; transform: rotate(-8deg) scale(1.15);
  }
  .app { position:relative; z-index:1; min-height:100vh; padding:18px 16px 24px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; }
  .top { width:100%; display:flex; justify-content:center; align-items:center; padding-top:4px; }
  .logo { width:min(250px, 54vw); filter: drop-shadow(0 0 16px rgba(140,255,0,.45)); border-radius:8px; }
  .title { text-align:center; margin:8px 0 0; line-height:.9; letter-spacing:1px; text-transform:uppercase; text-shadow: 0 4px 0 #000, 0 0 25px rgba(140,255,0,.75); }
  .title .small { display:block; color:#fff; font-size:clamp(28px, 8vw, 58px); transform:rotate(-2deg); }
  .title .big { display:block; color:var(--green); font-size:clamp(54px, 15vw, 110px); -webkit-text-stroke:2px #102000; }
  .gauge-wrap { position:relative; width:min(92vw, 560px); aspect-ratio:1/1; margin-top:2vh; }
  canvas { width:100%; height:100%; display:block; filter: drop-shadow(0 0 22px rgba(140,255,0,.35)); }
  .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; transform:translateY(4%); }
  .label { font-family:system-ui, sans-serif; font-weight:900; color:var(--muted); font-size:clamp(13px, 3.2vw, 18px); letter-spacing:2px; text-transform:uppercase; }
  .max { font-size:clamp(70px, 20vw, 138px); line-height:.9; color:#fff; text-shadow:0 0 20px rgba(255,255,255,.25), 0 5px 0 #000; }
  .live { margin-top:8px; font-family:system-ui, sans-serif; font-weight:900; font-size:clamp(18px, 5vw, 34px); color:var(--green); text-shadow:0 0 18px rgba(140,255,0,.75); }
  .status { min-height:24px; margin-top:4px; text-align:center; font-family:system-ui, sans-serif; font-size:14px; font-weight:700; color:#d8ffd0; opacity:.9; }
  .buttons { display:flex; gap:14px; width:min(92vw, 520px); padding-bottom:max(4px, env(safe-area-inset-bottom)); }
  button { flex:1; border:3px solid rgba(140,255,0,.95); border-radius:18px; padding:18px 8px; font-family:Impact,'Arial Black',sans-serif; font-size:clamp(30px, 8vw, 50px); letter-spacing:1px; color:#071007; background:linear-gradient(#c8ff3b, #65dd00); box-shadow:0 8px 0 #183900, 0 0 26px rgba(140,255,0,.35); text-transform:uppercase; }
  button:active { transform:translateY(5px); box-shadow:0 3px 0 #183900, 0 0 16px rgba(140,255,0,.3); }
  button.stop { color:#fff; background:linear-gradient(#303030,#070707); border-color:#fff; box-shadow:0 8px 0 #000, 0 0 18px rgba(255,255,255,.13); }
  .hint { font-family:system-ui, sans-serif; text-align:center; color:#9fba95; font-size:12px; max-width:560px; margin:4px 0 8px; }
  @media (orientation:landscape) and (max-height:650px) {
    .app { padding:8px 18px; display:grid; grid-template-columns:.8fr 1.15fr; grid-template-rows:auto 1fr auto; column-gap:16px; }
    .top { grid-column:1; grid-row:1; } .title { grid-column:1; grid-row:2; align-self:center; } .gauge-wrap { grid-column:2; grid-row:1 / span 3; width:min(66vh, 560px); justify-self:center; margin:0; } .buttons { grid-column:1; grid-row:3; width:100%; } .hint,.status { display:none; }
  }
</style>
</head>

  <h1 class="title"><span class="small">детский</span><span class="big">шумомер</span></h1>
  <div class="gauge-wrap">
    <canvas id="gauge" width="900" height="900"></canvas>
    <div class="center">
      <div class="label">максимум</div>

<script>
(() => {
  const canvas = document.getElementById('gauge');
  const ctx = canvas.getContext('2d');
  const maxEl = document.getElementById('maxValue');
  const liveEl = document.getElementById('liveValue');
  const statusEl = document.getElementById('status');
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');

  let audioCtx, analyser, data, stream, raf;
  let running = false;
  let current = 0, smooth = 0, maxValue = 0;
  let noiseFloorDb = -70;
  let floorSamples = [];
  let startedAt = 0;
  const visualMax = 120; // стрелка до края шкалы, цифры могут идти выше без ограничения

  function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
  function angleFor(value) {
    const p = clamp(value / visualMax, 0, 1);
    return (-135 + p * 270) * Math.PI / 180;
  }
  function drawGauge(value) {
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2, r = w*0.39;
    ctx.clearRect(0,0,w,h);

    ctx.save(); ctx.translate(cx,cy);
    // внешнее свечение
    const g = ctx.createRadialGradient(0,0,r*.2,0,0,r*1.25);
    g.addColorStop(0,'rgba(140,255,0,.08)'); g.addColorStop(.72,'rgba(140,255,0,.08)'); g.addColorStop(1,'rgba(140,255,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r*1.28,0,Math.PI*2); ctx.fill();

    ctx.lineCap='round';
    ctx.lineWidth=34; ctx.strokeStyle='rgba(255,255,255,.10)';
    ctx.beginPath(); ctx.arc(0,0,r, -135*Math.PI/180, 135*Math.PI/180); ctx.stroke();

    let a2 = angleFor(value);
    const grad = ctx.createLinearGradient(-r,-r,r,r);
    grad.addColorStop(0,'#44ff00'); grad.addColorStop(.7,'#d7ff22'); grad.addColorStop(1,'#ffffff');
    ctx.lineWidth=38; ctx.strokeStyle=grad;
    ctx.beginPath(); ctx.arc(0,0,r, -135*Math.PI/180, a2); ctx.stroke();

    // деления и цифры
    for (let i=0;i<=12;i++) {
      const val=i*10; const a=angleFor(val); const len=i%2===0?34:20;
      const x1=Math.cos(a)*(r-10), y1=Math.sin(a)*(r-10);
      const x2=Math.cos(a)*(r-len), y2=Math.sin(a)*(r-len);
      ctx.lineWidth=i%2===0?7:4; ctx.strokeStyle=i%2===0?'rgba(255,255,255,.9)':'rgba(140,255,0,.55)';
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      if (i%2===0) {
        ctx.fillStyle='rgba(255,255,255,.82)'; ctx.font='bold 28px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(String(val), Math.cos(a)*(r-72), Math.sin(a)*(r-72));
      }
    }

    // стрелка
    const a=angleFor(value), needleLen=r*.83;
    ctx.rotate(a);
    ctx.shadowColor='rgba(140,255,0,.9)'; ctx.shadowBlur=18;
    ctx.fillStyle='#f7fff0';
    ctx.beginPath(); ctx.moveTo(-22,-11); ctx.lineTo(needleLen,0); ctx.lineTo(-22,11); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#8cff00'; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#071007'; ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function computeLevel() {
    analyser.getByteTimeDomainData(data);
    let sum=0, peak=0;
    for (let i=0;i<data.length;i++) {
      const v=(data[i]-128)/128;
      sum += v*v; peak = Math.max(peak, Math.abs(v));
    }
    const rms = Math.sqrt(sum / data.length);
    const db = 20 * Math.log10(rms + 1e-8); // dBFS, зависит от микрофона

    // первые 0.8 сек запоминаем фон, чтобы музыка/зал меньше врали
    if (performance.now() - startedAt < 800) {
      floorSamples.push(db);
      const sorted=[...floorSamples].sort((a,b)=>a-b);
      noiseFloorDb = sorted[Math.floor(sorted.length*.45)] || -70;
    }

    const aboveFloor = Math.max(0, db - noiseFloorDb);
    const peakBonus = Math.max(0, peak - 0.12) * 38;
    // Игровая шкала без верхнего ограничения: чем громче микрофон, тем больше число.
    let score = aboveFloor * 3.15 + peakBonus;
    if (rms > 0.78 || peak > 0.97) score += 18; // бонус за почти предельный крик, без «залипания» на 100
    return score;
  }

  function loop() {
    if (!running) return;
    current = computeLevel();
    smooth = smooth * 0.78 + current * 0.22;
    if (smooth > maxValue) maxValue = smooth;
    const live = Math.round(smooth);
    const max = Math.round(maxValue);
    liveEl.textContent = 'сейчас: ' + live;
    maxEl.textContent = String(max);
    drawGauge(smooth);
    raf = requestAnimationFrame(loop);
  }

  async function start() {
    try {
      stop(false);
      maxValue = 0; current = 0; smooth = 0; floorSamples = []; noiseFloorDb = -70;
      maxEl.textContent='0'; liveEl.textContent='сейчас: 0'; drawGauge(0);
      statusEl.textContent='Запуск микрофона...';
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false, channelCount:1 }
      });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.2;
      data = new Uint8Array(analyser.fftSize);
      source.connect(analyser);
      running = true; startedAt = performance.now();
      statusEl.textContent='Кричим в телефон!';
      loop();
    } catch (e) {
      statusEl.textContent='Нет доступа к микрофону. Открой через HTTPS/локально и разреши микрофон.';
      console.error(e);
    }
  }

  function stop(keepStatus=true) {
    running = false;
    if (raf) cancelAnimationFrame(raf);
    if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
    if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx=null; }
    if (keepStatus) statusEl.textContent='Остановлено. Максимум сохранён.';
    drawGauge(smooth);
  }

  playBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', () => stop(true));
  document.addEventListener('visibilitychange', () => { if (document.hidden && running) stop(true); });
  drawGauge(0);
})();
</script>
</body>
</html>
